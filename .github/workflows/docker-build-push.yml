name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "services/**"
      - ".github/workflows/**"
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      admin: ${{ steps.changes.outputs.admin }}
      auth: ${{ steps.changes.outputs.auth }}
      email: ${{ steps.changes.outputs.email }}
      realtime: ${{ steps.changes.outputs.realtime }}
      restaurant: ${{ steps.changes.outputs.restaurant }}
      rider: ${{ steps.changes.outputs.rider }}
      utilities: ${{ steps.changes.outputs.utilities }}
      workflow: ${{ steps.changes.outputs.workflow }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changes per service
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            admin:
              - 'services/admin/**'
            auth:
              - 'services/auth/**'
            email:
              - 'services/email/**'
            realtime:
              - 'services/realtime/**'
            restaurant:
              - 'services/restaurant/**'
            rider:
              - 'services/rider/**'
            utilities:
              - 'services/utilities/**'
            workflow:
              - '.github/workflows/**'


  # ─── Admin Service ───────────────────────────────────────────────
  build-admin:
    name: Build & Push — Admin
    needs: detect-changes
    if: needs.detect-changes.outputs.admin == 'true' || needs.detect-changes.outputs.workflow == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t kravix-admin ./services/admin

      - name: Tag image
        if: github.event_name != 'pull_request'
        run: docker tag kravix-admin ${{ env.DOCKERHUB_USERNAME }}/kravix-admin:latest

      - name: Push image
        if: github.event_name != 'pull_request'
        run: docker push ${{ env.DOCKERHUB_USERNAME }}/kravix-admin:latest

  # ─── Email Service ────────────────────────────────────────────────
  build-email:
    name: Build & Push — Email
    needs: detect-changes
    if: needs.detect-changes.outputs.email == 'true' || needs.detect-changes.outputs.workflow == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t kravix-email ./services/email

      - name: Tag image
        if: github.event_name != 'pull_request'
        run: docker tag kravix-email ${{ env.DOCKERHUB_USERNAME }}/kravix-email:latest

      - name: Push image
        if: github.event_name != 'pull_request'
        run: docker push ${{ env.DOCKERHUB_USERNAME }}/kravix-email:latest

  # ─── Auth Service ────────────────────────────────────────────────
  build-auth:
    name: Build & Push — Auth
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true' || needs.detect-changes.outputs.workflow == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t kravix-auth ./services/auth

      - name: Tag image
        if: github.event_name != 'pull_request'
        run: docker tag kravix-auth ${{ env.DOCKERHUB_USERNAME }}/kravix-auth:latest

      - name: Push image
        if: github.event_name != 'pull_request'
        run: docker push ${{ env.DOCKERHUB_USERNAME }}/kravix-auth:latest

  # ─── Realtime Service ───────────────────────────────────────────
  build-realtime:
    name: Build & Push — Realtime
    needs: detect-changes
    if: needs.detect-changes.outputs.realtime == 'true' || needs.detect-changes.outputs.workflow == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t kravix-realtime ./services/realtime

      - name: Tag image
        if: github.event_name != 'pull_request'
        run: docker tag kravix-realtime ${{ env.DOCKERHUB_USERNAME }}/kravix-realtime:latest

      - name: Push image
        if: github.event_name != 'pull_request'
        run: docker push ${{ env.DOCKERHUB_USERNAME }}/kravix-realtime:latest

  # ─── Restaurant Service ─────────────────────────────────────────
  build-restaurant:
    name: Build & Push — Restaurant
    needs: detect-changes
    if: needs.detect-changes.outputs.restaurant == 'true' || needs.detect-changes.outputs.workflow == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t kravix-restaurant ./services/restaurant

      - name: Tag image
        if: github.event_name != 'pull_request'
        run: docker tag kravix-restaurant ${{ env.DOCKERHUB_USERNAME }}/kravix-restaurant:latest

      - name: Push image
        if: github.event_name != 'pull_request'
        run: docker push ${{ env.DOCKERHUB_USERNAME }}/kravix-restaurant:latest

  # ─── Rider Service ──────────────────────────────────────────────
  build-rider:
    name: Build & Push — Rider
    needs: detect-changes
    if: needs.detect-changes.outputs.rider == 'true' || needs.detect-changes.outputs.workflow == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t kravix-rider ./services/rider

      - name: Tag image
        if: github.event_name != 'pull_request'
        run: docker tag kravix-rider ${{ env.DOCKERHUB_USERNAME }}/kravix-rider:latest

      - name: Push image
        if: github.event_name != 'pull_request'
        run: docker push ${{ env.DOCKERHUB_USERNAME }}/kravix-rider:latest

  # ─── Utilities Service ──────────────────────────────────────────
  build-utilities:
    name: Build & Push — Utilities
    needs: detect-changes
    if: needs.detect-changes.outputs.utilities == 'true' || needs.detect-changes.outputs.workflow == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t kravix-utilities ./services/utilities

      - name: Tag image
        if: github.event_name != 'pull_request'
        run: docker tag kravix-utilities ${{ env.DOCKERHUB_USERNAME }}/kravix-utilities:latest

      - name: Push image
        if: github.event_name != 'pull_request'
        run: docker push ${{ env.DOCKERHUB_USERNAME }}/kravix-utilities:latest

